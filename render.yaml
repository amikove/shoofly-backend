services:
  - type: web
    name: shoofly-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: shoofly-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://shoofly.ma

databases:
  - name: shoofly-db
    plan: free
